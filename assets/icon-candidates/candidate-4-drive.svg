<svg viewBox="0 0 256 256" width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E2A4A"/>
      <stop offset="1" stop-color="#141C33"/>
    </linearGradient>
    <linearGradient id="cursor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D7E0F2"/>
    </linearGradient>
    <filter id="cshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0A0F1F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- UI panel the agent is driving -->
  <rect x="44" y="56" width="168" height="120" rx="20" fill="#243456"/>
  <rect x="44" y="56" width="168" height="120" rx="20" fill="none" stroke="#3A4E80" stroke-width="2"/>

  <!-- Window header dots -->
  <circle cx="68" cy="80" r="5" fill="#3A4E80"/>
  <circle cx="86" cy="80" r="5" fill="#3A4E80"/>
  <circle cx="104" cy="80" r="5" fill="#3A4E80"/>

  <!-- The button being driven (highlighted / active accent) -->
  <rect x="68" y="108" width="120" height="44" rx="14" fill="#34E1B4"/>
  <rect x="68" y="108" width="120" height="44" rx="14" fill="none" stroke="#5CF0CC" stroke-width="2"/>

  <!-- Click pulse rings emanating from the press point -->
  <circle cx="150" cy="130" r="34" fill="none" stroke="#34E1B4" stroke-width="3" opacity="0.30"/>
  <circle cx="150" cy="130" r="50" fill="none" stroke="#34E1B4" stroke-width="3" opacity="0.16"/>

  <!-- The driving cursor / pointer -->
  <g filter="url(#cshadow)">
    <path d="M138 116
             L138 196
             L160 174
             L174 204
             L188 198
             L174 168
             L204 168
             Z"
          fill="url(#cursor)"
          stroke="#0A0F1F" stroke-width="6"
          stroke-linejoin="round"/>
  </g>
</svg>
